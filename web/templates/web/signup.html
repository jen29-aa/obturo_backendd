{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Obturo EV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e1117; --card: #1a1f2e; --card2: #222836; --border: #2a3142; --green: #22c55e; --gd: #16a34a; --text: #f1f5f9; --muted: #94a3b8; --subtle: #64748b; }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .wrap { width: 100%; max-width: 480px; }
    .logo-row { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 28px; justify-content: center; }
    .logo-icon { width: 34px; height: 34px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .card { background: rgba(26,31,46,0.8); backdrop-filter: blur(28px) saturate(200%); -webkit-backdrop-filter: blur(28px) saturate(200%); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 36px 32px; box-shadow: 0 16px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07); }
    .card-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 6px; }
    .card-sub { color: var(--muted); font-size: 14px; margin-bottom: 26px; }
    .alert { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #f87171; border-radius: 10px; padding: 11px 14px; font-size: 14px; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
    .input-icon { position: relative; }
    .input-icon .form-input { padding-left: 40px; }
    .input-icon i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--subtle); font-size: 14px; pointer-events: none; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; transition: border-color .15s, box-shadow .15s; }
    .form-input:focus { border-color: rgba(34,197,94,0.6); box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
    .form-input::placeholder { color: var(--subtle); }
    .btn-submit { width: 100%; background: var(--green); border: none; color: #fff; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; margin-top: 6px; }
    .btn-submit:hover { background: var(--gd); }
    .switch-row { text-align: center; margin-top: 18px; font-size: 14px; color: var(--muted); }
    .switch-row a { color: var(--green); text-decoration: none; font-weight: 700; }
    @media (max-width: 500px) { .card { padding: 24px 18px; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon"><i class="fa fa-plug"></i></div>
    Obturo EV
  </div>
  <div class="card">
    <div class="card-title">Create your account</div>
    <div class="card-sub">Start your EV charging journey today.</div>

    {% if error %}<div class="alert"><i class="fa fa-circle-exclamation"></i> {{ error }}</div>{% endif %}

    <form method="post" action="{% url 'signup' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon">
          <i class="fa fa-user"></i>
          <input class="form-input" name="username" placeholder="Choose a username" required type="text">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon">
          <i class="fa fa-envelope"></i>
          <input class="form-input" name="email" type="email" placeholder="Enter your email" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="fa fa-lock"></i>
          <input class="form-input" name="password" type="password" placeholder="Create a secure password" required>
        </div>
      </div>
      <button class="btn-submit" type="submit"><i class="fa fa-user-plus"></i> Create Account</button>
    </form>
    <div class="switch-row">Already have an account? <a href="{% url 'login' %}">Sign in</a></div>
  </div>
</div>
</body>
</html>
