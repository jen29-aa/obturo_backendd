<!-- Active Bookings Sidebar -->
<div id="activeBookingsSidebar" class="abs-panel">
  <div class="abs-header">
    <div class="abs-header-left">
      <div class="abs-header-icon"><i class="fa-solid fa-bolt"></i></div>
      <div>
        <div class="abs-title">Active Bookings</div>
        <div class="abs-subtitle" id="absSubtitle">Loading...</div>
      </div>
    </div>
    <button class="abs-close" onclick="closeSidebar()" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div id="bookingsList" class="abs-list">
    <div class="abs-loading"><span class="abs-spinner"></span> Loading bookings</div>
  </div>

  <div class="abs-footer">
    <a href="{% url 'bookings' %}" class="abs-view-all"><i class="fa-solid fa-calendar-check"></i> View All Bookings</a>
  </div>
</div>

<!-- FAB Toggle Button -->
<button id="sidebarToggleBtn" class="abs-fab" onclick="toggleSidebar()" title="Active Bookings">
  <i class="fa-solid fa-bolt"></i>
  <span id="activeBkgCount" class="abs-fab-badge" style="display:none;">0</span>
</button>

<style>
  .abs-panel {
    position: fixed;
    right: -420px;
    top: 0;
    width: 400px;
    height: 100vh;
    background: #1a1f2e;
    border-left: 1px solid #2a3142;
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    z-index: 1200;
    transition: right 0.3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    font-family: "Inter","Segoe UI",sans-serif;
  }
  .abs-panel.open { right: 0; }

  /* Header */
  .abs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 18px;
    border-bottom: 1px solid #2a3142;
    background: linear-gradient(135deg, rgba(34,197,94,.12) 0%, rgba(22,163,74,.05) 100%);
    flex-shrink: 0;
  }
  .abs-header-left { display: flex; align-items: center; gap: 14px; }
  .abs-header-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #0f172a;
    box-shadow: 0 4px 12px rgba(34,197,94,.3);
    flex-shrink: 0;
  }
  .abs-title { font-size: 16px; font-weight: 700; color: #f1f5f9; }
  .abs-subtitle { font-size: 12px; color: #64748b; margin-top: 2px; }
  .abs-close {
    width: 34px; height: 34px;
    background: #222836; border: 1px solid #2a3142;
    border-radius: 8px; color: #94a3b8;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, border-color .15s;
    flex-shrink: 0;
  }
  .abs-close:hover { color: #f87171; border-color: #f87171; }

  /* List */
  .abs-list {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .abs-list::-webkit-scrollbar { width: 4px; }
  .abs-list::-webkit-scrollbar-track { background: transparent; }
  .abs-list::-webkit-scrollbar-thumb { background: #2a3142; border-radius: 4px; }

  /* Loading */
  .abs-loading { text-align: center; padding: 40px 16px; color: #64748b; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .abs-spinner {
    width: 28px; height: 28px;
    border: 3px solid #2a3142;
    border-top-color: #22c55e;
    border-radius: 50%;
    animation: absSpin .7s linear infinite;
    display: inline-block;
  }
  @keyframes absSpin { to { transform: rotate(360deg); } }

  /* Booking card */
  .abs-card {
    background: #222836;
    border: 1px solid #2a3142;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .abs-card:hover {
    border-color: rgba(34,197,94,.4);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  .abs-card-accent { height: 3px; background: linear-gradient(90deg, #22c55e, #16a34a); }
  .abs-card-accent.upcoming { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
  .abs-card-body { padding: 14px 16px; }
  .abs-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .abs-station-name {
    font-size: 14px; font-weight: 700; color: #f1f5f9;
    line-height: 1.3; flex: 1;
  }
  .abs-status-pill {
    font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  }
  .abs-status-pill.ongoing {
    background: rgba(34,197,94,.15); color: #22c55e;
    border: 1px solid rgba(34,197,94,.25);
  }
  .abs-status-pill.upcoming {
    background: rgba(96,165,250,.15); color: #60a5fa;
    border: 1px solid rgba(96,165,250,.25);
  }
  .abs-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .abs-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .abs-detail-item { background: #1a1f2e; border-radius: 8px; padding: 8px 10px; }
  .abs-detail-lbl { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .abs-detail-val { font-size: 13px; font-weight: 600; color: #f1f5f9; }

  .abs-time-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .abs-time-block {
    flex: 1; background: #1a1f2e; border-radius: 8px; padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .abs-time-block i { color: #22c55e; font-size: 12px; flex-shrink: 0; }
  .abs-time-lbl { font-size: 10px; color: #64748b; }
  .abs-time-val { font-size: 12px; font-weight: 600; color: #f1f5f9; margin-top: 1px; }

  .abs-card-actions { display: flex; gap: 8px; }
  .abs-btn-dir {
    flex: 1; background: #22c55e; color: #0f172a;
    border: none; border-radius: 7px; padding: 8px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .15s;
  }
  .abs-btn-dir:hover { background: #16a34a; }
  .abs-btn-view {
    flex: 1; background: transparent; color: #94a3b8;
    border: 1px solid #2a3142; border-radius: 7px; padding: 8px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color .15s, color .15s;
  }
  .abs-btn-view:hover { border-color: #60a5fa; color: #60a5fa; }

  /* Empty state */
  .abs-empty {
    text-align: center; padding: 48px 20px; color: #64748b;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .abs-empty-icon {
    width: 56px; height: 56px;
    background: #222836; border: 1px solid #2a3142;
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #2a3142;
  }
  .abs-empty p { font-size: 13px; line-height: 1.5; }

  /* Footer */
  .abs-footer { padding: 14px 16px; border-top: 1px solid #2a3142; flex-shrink: 0; }
  .abs-view-all {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2);
    color: #22c55e; border-radius: 10px; padding: 12px;
    font-size: 13px; font-weight: 600;
    transition: background .15s, border-color .15s;
    text-decoration: none;
  }
  .abs-view-all:hover { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.35); }

  /* FAB */
  .abs-fab {
    position: fixed; right: 24px; bottom: 28px;
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #0f172a; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(34,197,94,.35);
    z-index: 1100;
    transition: transform .15s, box-shadow .15s;
  }
  .abs-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(34,197,94,.5); }
  .abs-fab-badge {
    position: absolute; top: -6px; right: -6px;
    min-width: 20px; height: 20px; padding: 0 5px;
    background: #f87171; color: #fff;
    border-radius: 10px; border: 2px solid #131720;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  @media (max-width: 480px) {
    .abs-panel { width: 100%; right: -100%; }
  }
</style>

<script>
  function toggleSidebar() {
    var panel = document.getElementById('activeBookingsSidebar');
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
    } else {
      panel.classList.add('open');
      loadActiveBookings();
    }
  }
  function closeSidebar() {
    document.getElementById('activeBookingsSidebar').classList.remove('open');
  }
  function openSidebar() {
    document.getElementById('activeBookingsSidebar').classList.add('open');
    loadActiveBookings();
  }

  function loadActiveBookings() {
    var token = '{{ auth_token }}';
    var list = document.getElementById('bookingsList');
    var subtitle = document.getElementById('absSubtitle');
    var badge = document.getElementById('activeBkgCount');

    if (!token || token === 'None' || token === '') {
      list.innerHTML = '<div class="abs-empty"><div class="abs-empty-icon"><i class="fa-solid fa-lock"></i></div><p>Sign in to see your active bookings.</p></div>';
      badge.style.display = 'none';
      subtitle.textContent = 'Not signed in';
      return;
    }

    list.innerHTML = '<div class="abs-loading"><span class="abs-spinner"></span> Loading bookings\u2026</div>';

    fetch('/api/bookings/active/', {
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    })
    .then(function(r) {
      if (r.status === 401) { return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) {
        list.innerHTML = '<div class="abs-empty"><div class="abs-empty-icon"><i class="fa-solid fa-circle-exclamation"></i></div><p>Session expired. Please sign in again.</p></div>';
        badge.style.display = 'none';
        subtitle.textContent = 'Session expired';
        return;
      }
      if (data.count === 0) {
        list.innerHTML = '<div class="abs-empty"><div class="abs-empty-icon"><i class="fa-solid fa-calendar-xmark"></i></div><p>No active bookings right now.<br>Book a station to get started.</p></div>';
        badge.style.display = 'none';
        subtitle.textContent = 'No active bookings';
        return;
      }

      badge.textContent = data.count;
      badge.style.display = 'flex';
      subtitle.textContent = data.count + ' booking' + (data.count > 1 ? 's' : '') + ' active';

      var html = '';
      data.bookings.forEach(function(b) {
        var start = new Date(b.start_time);
        var end   = new Date(b.end_time);
        var now   = new Date();
        var ongoing = start <= now && now < end;
        var statusClass = ongoing ? 'ongoing' : 'upcoming';
        var statusLabel = ongoing ? 'Ongoing' : 'Upcoming';
        var accentClass = ongoing ? '' : 'upcoming';

        var shortDate = function(d) {
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                 d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        };

        var dirUrl = (b.station_latitude && b.station_longitude)
          ? 'https://www.google.com/maps/dir/?api=1&destination=' + b.station_latitude + ',' + b.station_longitude
          : '/route-map/';

        html += '<div class="abs-card" onclick="openBookingDetails(' + b.id + ')">' +
          '<div class="abs-card-accent ' + accentClass + '"></div>' +
          '<div class="abs-card-body">' +
            '<div class="abs-card-top">' +
              '<div class="abs-station-name">' + (b.station_name || 'Station') + '</div>' +
              '<div class="abs-status-pill ' + statusClass + '"><span class="abs-status-dot"></span>' + statusLabel + '</div>' +
            '</div>' +
            '<div class="abs-detail-grid">' +
              '<div class="abs-detail-item"><div class="abs-detail-lbl"><i class="fa-solid fa-bolt" style="color:#22c55e;margin-right:3px;"></i>Type</div><div class="abs-detail-val">' + (b.charger_type || '—') + '</div></div>' +
              '<div class="abs-detail-item"><div class="abs-detail-lbl"><i class="fa-solid fa-gauge-high" style="color:#60a5fa;margin-right:3px;"></i>Power</div><div class="abs-detail-val">' + (b.power_kw || '—') + ' kW</div></div>' +
            '</div>' +
            '<div class="abs-time-row">' +
              '<div class="abs-time-block"><i class="fa-solid fa-circle-play"></i><div><div class="abs-time-lbl">Start</div><div class="abs-time-val">' + shortDate(start) + '</div></div></div>' +
              '<div class="abs-time-block"><i class="fa-solid fa-circle-stop" style="color:#fb923c;"></i><div><div class="abs-time-lbl">End</div><div class="abs-time-val">' + shortDate(end) + '</div></div></div>' +
            '</div>' +
            '<div class="abs-card-actions">' +
              '<button class="abs-btn-dir" onclick="event.stopPropagation();window.open(\'' + dirUrl + '\',\'_blank\')"><i class="fa-solid fa-diamond-turn-right"></i> Directions</button>' +
              '<button class="abs-btn-view" onclick="event.stopPropagation();openBookingDetails(' + b.id + ')"><i class="fa-solid fa-circle-info"></i> Details</button>' +
            '</div>' +
          '</div></div>';
      });
      list.innerHTML = html;
    })
    .catch(function() {
      list.innerHTML = '<div class="abs-empty"><div class="abs-empty-icon"><i class="fa-solid fa-wifi"></i></div><p>Could not load bookings.<br>Check your connection.</p></div>';
    });
  }

  function openBookingDetails(id) {
    window.location.href = '/bookings/?booking_id=' + id;
  }

  window.addEventListener('load', function() {
    loadActiveBookings();
    // Update badge without opening panel
    var token = '{{ auth_token }}';
    if (token && token !== 'None' && token !== '') {
      fetch('/api/bookings/active/', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d && d.count > 0) {
          document.getElementById('activeBkgCount').textContent = d.count;
          document.getElementById('activeBkgCount').style.display = 'flex';
        }
      }).catch(function(){});
    }
  });

  setInterval(loadActiveBookings, 30000);
</script>
